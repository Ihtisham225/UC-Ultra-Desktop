name: Build & Release

on:
  push:
    tags:
      - 'v*'          # trigger on version tags e.g. v1.0.0
  workflow_dispatch:  # allow manual trigger from GitHub UI

# Each platform job uploads straight to the GitHub Release instead of
# staging through Actions artifact storage (which is capped at 0.5GB on
# the free plan and fills up fast with 100MB+ installers).
permissions:
  contents: write

jobs:
  # GitHub retired hosted Intel macOS runners, so we build both architectures
  # on the Apple Silicon runner. electron-builder cross-packages x64 fine
  # since this app has no native/compiled Node modules.
  build-mac:
    runs-on: macos-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci --legacy-peer-deps

      # electron-builder's auto-notarization expects APPLE_API_KEY to be a
      # file path, not raw content — materialize the secret into a file.
      - name: Write App Store Connect API key to file
        run: echo "${{ secrets.APPLE_API_KEY }}" > apple_api_key.p8

      - name: Build, sign & notarize (arm64 + x64)
        run: npm run build && npx electron-builder --mac --arm64 --x64 --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_API_KEY: ${{ github.workspace }}/apple_api_key.p8
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Remove API key file
        if: always()
        run: rm -f apple_api_key.p8

      - name: Publish macOS installers to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" --title "${{ github.ref_name }}" --generate-notes || true
          gh release upload "${{ github.ref_name }}" release/*.dmg release/*.zip --clobber

  build-win:
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build & package (Windows)
        run: npm run dist:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}

      - name: Publish Windows installers to release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" --title "${{ github.ref_name }}" --generate-notes || true
          gh release upload "${{ github.ref_name }}" release/*.exe --clobber
