appId: com.ucultra.pos
productName: UC-Ultra POS
copyright: Copyright © 2026 UC-Ultra

directories:
  output: release

files:
  - dist/**/*
  - dist-electron/**/*

publish:
  provider: github
  owner: Ihtisham225
  repo: UC-Ultra-Desktop

win:
  target:
    - target: nsis
      arch: [x64]
  icon: public/favicon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: public/favicon.ico
  uninstallerIcon: public/favicon.ico
  shortcutName: UC-Ultra POS

mac:
  target:
    - target: dmg
      arch: [x64, arm64]
  icon: public/favicon.ico
  category: public.app-category.business

linux:
  target:
    - target: AppImage
      arch: [x64]
  icon: public/favicon.ico
  category: Office
